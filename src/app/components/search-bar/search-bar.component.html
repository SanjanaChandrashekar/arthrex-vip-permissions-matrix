<div class="search-bar">
  <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="11" cy="11" r="8"/>
    <path d="m21 21-4.3-4.3"/>
  </svg>
  <input
    type="text"
    class="search-input"
    placeholder="Search actions... (e.g. 'upload', 'plan', 'case')"
    [value]="svc.searchTerm()"
    (input)="onInput($any($event.target).value)"
    aria-label="Search permissions"
  />
  @if (svc.searchTerm()) {
    <button class="clear-btn" (click)="clearSearch()" aria-label="Clear search">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  }
</div>
