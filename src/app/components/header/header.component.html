<header class="header">
  <div class="header-brand">
    <span class="header-arthrex">Arthrex</span>
    <span class="header-sep">|</span>
    <span class="header-product">Virtual Implant Positioning</span>
    <span class="header-version">v9.2.0</span>
  </div>
  <nav class="header-nav">
    <span
      class="header-nav-item"
      [class.active]="activeTab === 'permissions'"
      (click)="tabChange.emit('permissions')"
    >PERMISSIONS</span>
    <span
      class="header-nav-item"
      [class.active]="activeTab === 'case-status'"
      (click)="tabChange.emit('case-status')"
    >CASE STATUS</span>
  </nav>
</header>
